# Render Blueprint configuration for FeastFast Express
services:
  - type: web
    name: feastfast-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js

  - type: static
    name: feastfast-storefront
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
